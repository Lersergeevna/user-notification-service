server.port=${APP_NOTIFICATION_SERVICE_PORT:8081}

spring.kafka.bootstrap-servers=${APP_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${APP_KAFKA_CONSUMER_GROUP_ID:notification-service-group}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.max-poll-records=${APP_KAFKA_MAX_POLL_RECORDS:10}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.admin.fail-fast=false
spring.kafka.listener.missing-topics-fatal=false

app.kafka.notifications.topic=${APP_KAFKA_NOTIFICATIONS_TOPIC:user-notifications}
app.kafka.notifications.partitions=${APP_KAFKA_NOTIFICATIONS_PARTITIONS:1}
app.kafka.notifications.replicas=${APP_KAFKA_NOTIFICATIONS_REPLICAS:1}
app.notifications.idempotency.max-size=${APP_NOTIFICATIONS_IDEMPOTENCY_MAX_SIZE:10000}
app.notifications.idempotency.retention=${APP_NOTIFICATIONS_IDEMPOTENCY_RETENTION:PT24H}

spring.mail.host=${APP_MAIL_HOST:localhost}
spring.mail.port=${APP_MAIL_PORT:1025}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.connectiontimeout=${APP_MAIL_CONNECTION_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.timeout=${APP_MAIL_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.writetimeout=${APP_MAIL_WRITE_TIMEOUT_MS:5000}
app.mail.from=${APP_MAIL_FROM:no-reply@yoursite.local}
app.site.name=${APP_SITE_NAME:\u041D\u0430\u0448 \u0441\u0430\u0439\u0442}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
info.app.name=notification-service
info.app.description=\u041C\u0438\u043A\u0440\u043E\u0441\u0435\u0440\u0432\u0438\u0441 \u0434\u043B\u044F \u043E\u0442\u043F\u0440\u0430\u0432\u043A\u0438 \u0443\u0432\u0435\u0434\u043E\u043C\u043B\u0435\u043D\u0438\u0439